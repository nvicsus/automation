name: Create PR in downstream repo

on:
  workflow_call:
    secrets:
      PAT:
        required: true

jobs:
  create-pr-in-target:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR info
        id: pr
        run: |
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_ENV
          echo "pr_body=${{ github.event.pull_request.body }}" >> $GITHUB_ENV
          echo "pr_head=${{ github.event.pull_request.head.ref }}" >> $GITHUB_ENV
          echo "pr_base=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
          target_repo=$(echo "${GITHUB_REPOSITORY#*/}" | sed 's/DA-//')
          echo "target_repo=$target_repo" >> $GITHUB_ENV
          echo "target_owner=nvicsus" >> $GITHUB_ENV

      - name: Create PR in target repo
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          URL="https://api.github.com/repos/$target_owner/$target_repo/pulls"
          request_body=$(jq -n \
            --arg pr_title "$pr_title" \
            --arg pr_body "$pr_body" \
            --arg pr_head "$pr_head" \
            --arg pr_base "$pr_base" \
            '{title: $pr_title, body: $pr_body, head: $pr_head, base: $pr_base}')

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            -d "$request_body" \
            "$URL" 



